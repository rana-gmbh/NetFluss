name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # Build the x86_64 openvpn + dylib closure on an Intel runner (deployment
  # target = the runner's macOS), so the Intel slice runs on real Intel Macs.
  # Apple Silicon can't produce a usable Intel openvpn (no Homebrew bottle; a
  # from-source build there targets the newest macOS).
  intel-openvpn:
    runs-on: macos-13
    steps:
      - name: Build Intel openvpn
        run: |
          brew install openvpn
          P="$(brew --prefix)"
          MIR="$RUNNER_TEMP/intel-brew"
          mkdir -p "$MIR/opt/openvpn/sbin" "$MIR/opt/lzo/lib" "$MIR/opt/lz4/lib" \
                   "$MIR/opt/pkcs11-helper/lib" "$MIR/opt/openssl@3/lib"
          cp -L "$P/opt/openvpn/sbin/openvpn" "$MIR/opt/openvpn/sbin/openvpn"
          cp -L "$P/opt/lzo/lib/liblzo2.2.dylib" "$MIR/opt/lzo/lib/"
          cp -L "$P/opt/lz4/lib/liblz4.1.dylib" "$MIR/opt/lz4/lib/"
          cp -L "$P/opt/pkcs11-helper/lib/libpkcs11-helper.1.dylib" "$MIR/opt/pkcs11-helper/lib/"
          cp -L "$P/opt/openssl@3/lib/libssl.3.dylib" "$MIR/opt/openssl@3/lib/"
          cp -L "$P/opt/openssl@3/lib/libcrypto.3.dylib" "$MIR/opt/openssl@3/lib/"
          lipo -archs "$MIR/opt/openvpn/sbin/openvpn"

      - uses: actions/upload-artifact@v4
        with:
          name: intel-openvpn
          path: ${{ runner.temp }}/intel-brew

  notarize:
    runs-on: macos-15
    needs: intel-openvpn
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build -c release --arch arm64 --arch x86_64

      - name: Assemble app bundle
        run: |
          mkdir -p NetFluss.app/Contents/MacOS
          mkdir -p NetFluss.app/Contents/Resources
          mkdir -p NetFluss.app/Contents/Library/HelperTools
          mkdir -p NetFluss.app/Contents/Library/LaunchDaemons
          cp .build/apple/Products/Release/Netfluss NetFluss.app/Contents/MacOS/NetFluss
          cp .build/apple/Products/Release/NetflussPrivilegedHelper NetFluss.app/Contents/Library/HelperTools/NetflussPrivilegedHelper
          cp Packaging/Info.plist NetFluss.app/Contents/Info.plist
          cp Packaging/LaunchDaemons/com.local.netfluss.privilegedhelper.plist \
            NetFluss.app/Contents/Library/LaunchDaemons/com.local.netfluss.privilegedhelper.plist
          cp Packaging/Resources/AppIcon.icns NetFluss.app/Contents/Resources/AppIcon.icns
          cp Packaging/Resources/AppIconDark.icns NetFluss.app/Contents/Resources/AppIconDark.icns
          cp -R Packaging/Resources/SpeedTest NetFluss.app/Contents/Resources/SpeedTest
          cp -R Packaging/Resources/*.lproj NetFluss.app/Contents/Resources/
          VERSION="${GITHUB_REF_NAME#v}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" NetFluss.app/Contents/Info.plist
          BUILD=$(git rev-list --count HEAD)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" NetFluss.app/Contents/Info.plist

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "ci" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "ci" build.keychain
          security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "ci" build.keychain

      - name: Download Intel openvpn
        uses: actions/download-artifact@v4
        with:
          name: intel-openvpn
          path: ${{ runner.temp }}/intel-brew

      - name: Bundle OpenVPN (universal)
        run: |
          brew install openvpn
          export X86_BREW="$RUNNER_TEMP/intel-brew"
          ./Packaging/VPN/bundle-openvpn.sh NetFluss.app/Contents/Library/VPN \
            "Developer ID Application: Rana GmbH (D6P24X5377)"
          xattr -cr NetFluss.app
          echo "Bundled openvpn arches:"; lipo -archs NetFluss.app/Contents/Library/VPN/openvpn

      - name: Sign
        run: |
          codesign --force \
            --sign "Developer ID Application: Rana GmbH (D6P24X5377)" \
            --options=runtime \
            --timestamp \
            NetFluss.app/Contents/Library/HelperTools/NetflussPrivilegedHelper
          codesign --force \
            --sign "Developer ID Application: Rana GmbH (D6P24X5377)" \
            --options=runtime \
            --timestamp \
            --entitlements Netfluss.entitlements \
            NetFluss.app
          codesign --verify --deep --strict NetFluss.app

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ditto -c -k --sequesterRsrc --keepParent NetFluss.app "NetFluss-${VERSION}.zip"

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          xcrun notarytool submit "NetFluss-${VERSION}.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "D6P24X5377" \
            --wait

      - name: Staple
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for attempt in 1 2 3 4 5 6; do
            if xcrun stapler staple NetFluss.app; then
              break
            fi
            if [ "$attempt" -eq 6 ]; then
              exit 1
            fi
            sleep 20
          done
          xcrun stapler validate NetFluss.app
          rm "NetFluss-${VERSION}.zip"
          ditto -c -k --sequesterRsrc --keepParent NetFluss.app "NetFluss-${VERSION}.zip"

      - name: Upload to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release upload "v${VERSION}" "NetFluss-${VERSION}.zip" --clobber
